<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recipe Concierge</title>
    <style>
        :root { --gold: #c5a059; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; }
        header { width: 100%; padding: 1.5rem 0; text-align: center; border-bottom: 1px solid var(--gold); margin-bottom: 1.5rem; }
        h1 { color: var(--gold); font-size: 1.3rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .container { width: 92%; max-width: 500px; }
        
        .search-input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; margin-bottom: 12px; box-sizing: border-box; font-size: 1rem; }
        .btn { background: var(--gold); color: var(--bg); border: none; padding: 1rem; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 1rem; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }

        .recipe-card { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 1.5rem; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #recipe-image { width: 100%; height: auto; border-radius: 10px; margin: 1rem 0; border: 1px solid #444; }
        
        .ai-section { background: #1a1a1a; border: 1px solid var(--gold); border-radius: 15px; padding: 1.5rem; position: relative; overflow: hidden; }
        .ai-section::before { content: "AI"; position: absolute; top: 10px; right: 15px; color: var(--gold); font-weight: bold; opacity: 0.5; }
        #ai-response { font-size: 0.95rem; color: #ccc; line-height: 1.7; text-align: left; white-space: pre-wrap; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }

        .description { font-size: 0.9rem; line-height: 1.6; color: #bbb; margin-bottom: 1.5rem; text-align: left; }
    </style>
</head>
<body>

    <header><h1>Recipe Concierge</h1></header>
    
    <div class="container">
        <div style="margin-bottom: 25px;">
            <input type="text" id="ingredient-input" class="search-input" placeholder="食材で検索 (例: 豚肉)">
            <button class="btn" onclick="getRecipe()">楽天レシピを検索</button>
        </div>

        <div class="recipe-card" id="recipe-display">
            <h2 style="color: var(--gold); margin-top: 0; font-size: 1.2rem;">Today's Suggestion</h2>
            <p style="font-size: 0.9rem;">食材名を入力して検索するか、<br>下のAIチャットに自由に相談してください。</p>
        </div>

        <div class="ai-section">
            <h3 style="color: var(--gold); margin-top: 0; font-size: 1.1rem;">AIに献立を相談</h3>
            <p style="font-size: 0.8rem; color: #888;">例：練習後の疲労回復メニューは？ / 予算500円で！</p>
            <input type="text" id="ai-input" class="search-input" placeholder="AIにメッセージを送る...">
            <button class="btn" style="background: transparent; color: var(--gold); border: 1px solid var(--gold);" onclick="askAI()">AIに聞く</button>
            <div id="ai-response">相談内容を入力してください...</div>
        </div>
    </div>

    <script>
        const RAKUTEN_APP_ID = '64a27c09-e07a-4b8c-a04e-ce045638b393';
        const GEMINI_API_KEY = 'AIzaSyCF2pKm_NMKc4KScaRGRRb-DOizOqkve0g';

        // 楽天レシピ検索
        async function getRecipe() {
            const display = document.getElementById('recipe-display');
            const keyword = document.getElementById('ingredient-input').value.trim();
            display.innerHTML = '<p style="color: var(--gold);">楽天からレシピを取得中...</p>';

            const rakutenUrl = `https://app.rakuten.co.jp/services/api/Recipe/CategoryRanking/20170426?applicationId=${RAKUTEN_APP_ID}&keyword=${encodeURIComponent(keyword || "健康")}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rakutenUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const proxyData = await response.json();
                const data = JSON.parse(proxyData.contents);
                
                if (data.result && data.result.length > 0) {
                    const r = data.result[Math.floor(Math.random() * data.result.length)];
                    display.innerHTML = `
                        <h2 style="color: var(--gold); font-size: 1.1rem;">${r.recipeTitle}</h2>
                        <img id="recipe-image" src="${r.foodImageUrl}">
                        <p class="description">${r.recipeDescription}</p>
                        <a href="${r.recipeUrl}" target="_blank" class="btn" style="text-decoration:none; display:block; text-align:center;">レシピを見る</a>
                    `;
                } else {
                    display.innerHTML = "<p>見つかりませんでした。AIに相談してみてください！</p>";
                }
            } catch (e) {
                display.innerHTML = "<p>楽天APIが準備中です。下のAIチャットは使えます！</p>";
            }
        }

        // AI相談機能
        async function askAI() {
            const input = document.getElementById('ai-input').value;
            const responseArea = document.getElementById('ai-response');
            if (!input) return;

            responseArea.innerText = "AIが考えています...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: あなたは親切な料理コンシェルジュです。ユーザーの質問「${input}」に対して、健康的で美味しいレシピのアイデアを、150文字程度で簡潔に提案してください。 }] }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                responseArea.innerText = aiText;
            } catch (e) {
                responseArea.innerText = "エラー：AIとの通信に失敗しました。キーの有効化を待っている可能性があります。";
            }
        }
    </script>
</body>
</html>
