<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Autonomous Concierge</title>
    <style>
        :root { --gold: #c5a059; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; }
        header { width: 100%; padding: 1.5rem 0; text-align: center; border-bottom: 1px solid var(--gold); margin-bottom: 1.5rem; }
        h1 { color: var(--gold); font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .container { width: 92%; max-width: 500px; }
        .btn { background: var(--gold); color: var(--bg); border: none; padding: 1rem; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 1rem; margin-top: 10px; }
        .recipe-card { background: var(--card); border: 1px solid var(--gold); border-radius: 15px; padding: 1.5rem; text-align: left; margin-top: 20px; min-height: 100px; }
        .ai-input-area { background: #1a1a1a; border: 1px solid #444; border-radius: 15px; padding: 1.5rem; margin-top: 20px; width: 100%; box-sizing: border-box; }
        textarea { width: 100%; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; box-sizing: border-box; font-size: 1rem; min-height: 80px; }
        #status-log { font-size: 0.75rem; color: #888; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <header><h1>Autonomous Concierge</h1></header>
    <div class="container">
        
        <div class="ai-input-area">
            <p style="color: var(--gold); margin: 0 0 10px 0; font-size: 0.9rem;">AIへのリクエスト</p>
            <textarea id="ai-request" placeholder="例：牛肉を使った、ダンス練習後に効くスタミナ料理を考えて"></textarea>
            <button class="btn" onclick="generateAutonomous()">AIにレシピを生成させて更新</button>
            <div id="status-log">待機中...</div>
        </div>

        <div id="recipe-output" class="recipe-card">
            <h2 id="res-title" style="color: var(--gold); margin-top: 0; font-size: 1.2rem;">AIレシピ提案</h2>
            <div id="res-content" style="font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap;">
                ここにAIが生成した内容が自動で反映されます。
            </div>
        </div>

    </div>

    <script>
        // GitHubに公開すると再び警告が出ますが、動作確認のため一旦このままで進めます
        const GEMINI_API_KEY = 'AIzaSyCF2pKm_NMKc4KScaRGRRb-DOizOqkve0g';

        async function generateAutonomous() {
            const requestText = document.getElementById('ai-request').value;
            const log = document.getElementById('status-log');
            const resTitle = document.getElementById('res-title');
            const resContent = document.getElementById('res-content');

            if (!requestText) {
                log.innerText = "リクエストを入力してください";
                return;
            }

            log.innerText = "AIが思考中（APIに接続しています）...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `あなたはプロの料理研究家です。以下のリクエストに対して、最適な料理名とその具体的なレシピ（材料と工程）を150文字程度で作成してください。リクエスト：${requestText}` }] }]
                    })
                });

                if (!response.ok) {
                    throw new Error("APIキーが無効になっている可能性があります");
                }

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;

                // 簡易的なパース：最初の1行をタイトルにする
                const lines = aiResponse.split('\n');
                resTitle.innerText = lines[0].replace(/#|＊|\*/g, ''); 
                resContent.innerText = lines.slice(1).join('\n').trim();

                log.innerText = "AIによる更新が成功しました！";
            } catch (error) {
                console.error(error);
                log.innerText = "エラー: " + error.message;
                resContent.innerText = "AIとの連携に失敗しました。GitHubのアラートによりキーが停止された可能性があります。新しいキーをGoogle AI Studioで再発行することをお勧めします。";
            }
        }
    </script>
</body>
</html>
