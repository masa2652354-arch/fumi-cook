<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous AI Recipe</title>
    <style>
        :root { --gold: #c5a059; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; }
        header { width: 100%; padding: 1.5rem 0; text-align: center; border-bottom: 1px solid var(--gold); margin-bottom: 1.5rem; }
        h1 { color: var(--gold); font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .container { width: 92%; max-width: 500px; }
        .btn { background: var(--gold); color: var(--bg); border: none; padding: 1rem; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 1rem; }
        .recipe-card { background: var(--card); border: 1px solid var(--gold); border-radius: 15px; padding: 1.5rem; text-align: left; margin-top: 20px; display: none; }
        .ai-section { background: #1a1a1a; border: 1px solid #444; border-radius: 15px; padding: 1.5rem; margin-top: 20px; }
        #ai-status { font-size: 0.8rem; color: var(--gold); margin-bottom: 10px; }
        textarea { width: 100%; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; }
    </style>
</head>
<body>
    <header><h1>Autonomous Recipe Concierge</h1></header>
    <div class="container">
        <div class="ai-section">
            <div id="ai-status">AIコンシェルジュ待機中</div>
            <textarea id="ai-request" placeholder="例：旬の食材を使った、エンジニア向けの集中力UPメニューを提案して"></textarea>
            <button class="btn" onclick="generateRecipe()">AIにレシピを自動生成させる</button>
        </div>

        <div id="recipe-output" class="recipe-card">
            <h2 id="r-title" style="color: var(--gold); margin-top: 0;"></h2>
            <p id="r-desc" style="font-size: 0.95rem; line-height: 1.6;"></p>
            <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
            <p style="font-size: 0.8rem; color: #888;">※このレシピはAIによって自動生成されました。</p>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = 'AIzaSyCF2pKm_NMKc4KScaRGRRb-DOizOqkve0g';

        async function generateRecipe() {
            const requestText = document.getElementById('ai-request').value;
            const status = document.getElementById('ai-status');
            const output = document.getElementById('recipe-output');
            
            if(!requestText) return;
            status.innerText = "AIが新しいコードとレシピを考案中...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `以下のリクエストに基づき、料理名と作り方の説明をJSON形式で出力してください。料理名は"title"、説明は"desc"というキーにしてください。リクエスト：${requestText}` }] }]
                    })
                });

                const data = await response.json();
                let aiText = data.candidates[0].content.parts[0].text;
                
                // AIの返答からJSON部分だけを抽出
                const jsonMatch = aiText.match(/\{.*\}/s);
                const recipeData = JSON.parse(jsonMatch[0]);

                // 画面を自動更新
                document.getElementById('r-title').innerText = recipeData.title;
                document.getElementById('r-desc').innerText = recipeData.desc;
                output.style.display = "block";
                status.innerText = "AIによる自動更新が完了しました！";
                
            } catch (e) {
                console.error(e);
                status.innerText = "エラーが発生しました。もう一度試してください。";
            }
        }
    </script>
</body>
</html>
